name: startup_bite
description: "스타트업 한 입 - 매일 스타트업 용어 학습 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.4.0
  shared_preferences: ^2.2.0
  flip_card: ^0.7.0
  google_fonts: ^6.1.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.68.0
  supabase_flutter: ^2.3.0
  flutter_local_notifications: ^17.0.0
  uuid: ^4.2.0
  home_widget: ^0.9.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  mocktail: ^1.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.jpg"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icon.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/data/terms.json
    - .env
